<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<section class="max-w-5xl w-full px-6 py-12">

    <div class="text-center mb-10">
        <h2 class="text-3xl font-semibold text-gray-700">Our Pricing</h2>

        <div class="flex items-center justify-center gap-3 mt-4 text-gray-500">
            <span>Annually</span>

            <div class="w-12 h-6 bg-indigo-400 rounded-full relative">
                <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 right-0.5"></div>
            </div>

            <span>Monthly</span>
        </div>
    </div>

    <div class="grid md:grid-cols-3 gap-6">

        <div class="bg-white rounded-2xl shadow p-8 text-center">
            <h3 class="text-gray-600 font-medium">Basic</h3>
            <p class="text-4xl font-bold text-gray-800 mt-4">$199.99</p>

            <ul class="mt-6 space-y-3 text-gray-500 text-sm">
                <li>500 GB Storage</li>
                <li>2 Users Allowed</li>
                <li>Send up to 3 GB</li>
            </ul>

            <button class="mt-8 w-full py-3 rounded-xl bg-indigo-500 text-white font-medium">
                Learn More
            </button>
        </div>

        <div class="bg-indigo-500 rounded-2xl shadow-lg p-8 text-center text-white scale-105">
            <h3 class="font-medium">Professional</h3>
            <p class="text-4xl font-bold mt-4">$249.99</p>

            <ul class="mt-6 space-y-3 text-indigo-100 text-sm">
                <li>1 TB Storage</li>
                <li>5 Users Allowed</li>
                <li>Send up to 10 GB</li>
            </ul>

            <button class="mt-8 w-full py-3 rounded-xl bg-white text-indigo-600 font-medium">
                Learn More
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow p-8 text-center">
            <h3 class="text-gray-600 font-medium">Master</h3>
            <p class="text-4xl font-bold text-gray-800 mt-4">$399.99</p>

            <ul class="mt-6 space-y-3 text-gray-500 text-sm">
                <li>2 TB Storage</li>
                <li>10 Users Allowed</li>
                <li>Send up to 20 GB</li>
            </ul>

            <button class="mt-8 w-full py-3 rounded-xl bg-indigo-500 text-white font-medium">
                Learn More
            </button>
        </div>

    </div>
</section>

</body>
</html>
