<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-400 to-teal-500">
<div class="bg-white rounded-2xl shadow-xl p-8 max-w-4xl w-full flex flex-col items-center justify-center">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
        <div class="flex flex-col items-center">
            <div class="w-=56 h-56 rounded-full flex items-center justify-center mb-4">
                <img src="img/img_1.png" alt="personal__t-shirt">
            </div>
            <h3 class="uppercase tracking-widest text-gray-500 font-extrabold text-sm">Personal</h3>
            <ul class="mt-4 space-y-2 text-sm font-bold">
                <li class="text-gray-500"><span class="text-black">1</span> DOMAIN</li>
                <li class="text-gray-500"><span class="text-black">500</span> Disk Space</li>
                <li class="text-gray-500"><span class="text-black">E-mail</span> Support</li>
            </ul>
            <p class="mt-6 text-2xl font-semibold text-gray-500">$0.00</p>
        </div>

        <div class="flex flex-col items-center">
            <div class="w-56 h-56 rounded-ful flex items-center justify-center mb-4">
                <img src="img/img.png" alt="team__t-shirt">
            </div>
            <h3 class="uppercase tracking-widest text-yellow-500 text-sm font-extrabold">TEAM</h3>
            <ul class="mt-4 space-y-2  text-sm font-bold">
                <li class="text-gray-500"> <span class="text-black">5 </span>DOMAIN</li>
                <li class="text-gray-500"> <span class="text-black">1000</span> Disk Space</li>
                <li class="text-gray-500"> <span class="text-black">Mon-Fri</span> Support</li>
            </ul>
            <p class="mt-6 text-2xl font-bold text-yellow-500">$99.99</p>
        </div>

        <div class="flex flex-col items-center">
            <div class="w-56 h-56 rounded-full  flex items-center justify-center mb-4">
                <img src="img/img_2.png" alt="personal__t-shirt">
            </div>
            <h3 class="uppercase tracking-widest text-red-500 text-sm font-extrabold">Corporate</h3>
            <ul class="mt-4 space-y-2 text-gray-400 text-sm font-bold">
                <li class="text-gray-500"> <span class="text-black">20</span> DOMAIN</li>
                <li class="text-gray-500"> <span class="text-black">Unlimited</span> Disk Space</li>
                <li class="text-gray-500"> <span class="text-black">24/7</span> Support</li>
            </ul>
            <p class="mt-6 text-2xl font-bold text-red-500">$399.9</p>
        </div>
    </div>
</div>
</body>
</html>
